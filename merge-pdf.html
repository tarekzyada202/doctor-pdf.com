<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge PDF Files Online Free | Doctor PDF</title>
<meta name="description" content="Merge multiple PDF files into one online for free. Fast, secure, browser-based.">
<link rel="canonical" href="https://doctor-pdf-1lg.pages.dev/merge-pdf.html">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📄</text></svg>">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3EGBBVX022"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-3EGBBVX022');</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#6366f1;--secondary:#8b5cf6;--success:#10b981;--bg:#f8fafc;--surface:#ffffff;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--radius:14px}
.dark{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#f1f5f9;--text-muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;background:rgba(248,250,252,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
.dark .navbar{background:rgba(15,23,42,.92)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;font-size:1.1em;font-weight:800;color:var(--primary)}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9em;box-shadow:0 3px 10px rgba(99,102,241,.3)}
.nav-actions{display:flex;align-items:center;gap:8px}
.btn-icon{width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85em;transition:all .2s;color:var(--text)}
.btn-icon:hover{background:var(--primary);color:white;border-color:var(--primary)}
/* FULL-SCREEN LAYOUT */
.page-wrap{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 56px)}
/* LEFT PANEL */
.panel{background:var(--surface);border-right:1px solid var(--border);padding:28px 24px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
.tool-header .tool-emoji{font-size:2.5em;display:block;margin-bottom:8px}
.tool-header h1{color:var(--primary);font-size:1.4em;font-weight:800;margin-bottom:4px;letter-spacing:-.4px}
.tool-header .tool-desc{color:var(--text-muted);font-size:.82em;line-height:1.5}
/* UPLOAD */
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;background:var(--bg);transition:all .2s}
.upload-area:hover{border-color:var(--primary);background:rgba(99,102,241,.04)}
.up-icon{font-size:2em;display:block;margin-bottom:8px}
.up-title{color:var(--primary);font-weight:700;font-size:.9em;margin-bottom:2px}
.up-sub{color:var(--text-muted);font-size:.75em}
input[type=file]{display:none}
/* OPTIONS */
.options-box{background:var(--bg);border-radius:10px;padding:16px;border:1px solid var(--border)}
.opt-label{display:block;font-weight:600;font-size:.75em;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.opt-select,.opt-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:.88em;background:var(--surface);color:var(--text);margin-bottom:12px;font-family:inherit;transition:border .2s}
.opt-select:focus,.opt-input:focus{outline:none;border-color:var(--primary)}
.opt-select:last-child,.opt-input:last-child{margin-bottom:0}
/* FORMAT GRID */
.format-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0}
.format-option{background:var(--bg);padding:10px 4px;border-radius:8px;cursor:pointer;text-align:center;border:2px solid var(--border);transition:all .2s;font-size:.75em;font-weight:600;color:var(--text-muted)}
.format-option:hover{border-color:var(--primary);color:var(--primary)}
.format-option.selected{background:var(--primary);color:white;border-color:var(--primary)}
.format-icon{font-size:1.2em;display:block;margin-bottom:2px}
/* BUTTON */
.action-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border:none;padding:13px 24px;border-radius:100px;font-size:.92em;font-weight:700;cursor:pointer;width:100%;transition:all .2s;letter-spacing:.1px;margin-top:auto}
.action-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.35)}
.action-btn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;transform:none;box-shadow:none}
/* PROGRESS */
.progress-wrap{display:none}
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));width:0%;transition:width .3s;border-radius:100px}
.progress-text{font-size:.75em;color:var(--text-muted);margin-top:5px;text-align:center}
/* RESULT */
.result-box{display:none;padding:16px;background:rgba(16,185,129,.08);border-radius:10px;border:1px solid rgba(16,185,129,.2);text-align:center}
.result-box .result-title{color:var(--success);font-weight:700;font-size:.88em;margin-bottom:10px}
.download-btn{background:var(--success);color:white;padding:10px 24px;border-radius:100px;font-size:.85em;font-weight:700;text-decoration:none;display:inline-block;transition:all .2s;border:none;cursor:pointer}
.download-btn:hover{background:#059669;transform:translateY(-1px)}
/* FILE LIST (panel) */
.file-list-panel{display:flex;flex-direction:column;gap:6px}
.file-item{background:var(--bg);padding:10px 12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)}
.file-name{font-weight:500;color:var(--text);font-size:.78em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%}
.remove-btn{background:none;border:1px solid #ff4757;color:#ff4757;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:.7em;font-weight:600;transition:all .2s}
.remove-btn:hover{background:#ff4757;color:white}
/* SPINNER */
.spinner{border:3px solid var(--border);border-top:3px solid var(--primary);border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:8px auto;display:none}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.stat-box{background:var(--bg);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.stat-label{font-size:.65em;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.stat-value{font-size:1em;font-weight:800;color:var(--primary);margin-top:2px}
/* RIGHT CONTENT AREA */
.content-area{padding:28px 32px;overflow-y:auto;display:flex;flex-direction:column;gap:20px;background:var(--bg)}
.content-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);text-align:center;gap:16px}
.content-placeholder .ph-icon{font-size:4em;opacity:.3}
.content-placeholder p{font-size:.9em;opacity:.6}
/* SIGN canvas */
#signCanvas{border:2px solid var(--border);border-radius:10px;cursor:crosshair;width:100%;touch-action:none;background:white;display:block}
.sign-controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.sign-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.78em;font-weight:600;transition:all .2s;font-family:inherit}
.sign-btn:hover{border-color:var(--primary);color:var(--primary)}
/* BACK */
.back-link{display:inline-flex;align-items:center;gap:5px;color:var(--primary);text-decoration:none;font-weight:600;font-size:.8em;margin-bottom:4px;opacity:.8;transition:opacity .2s}
.back-link:hover{opacity:1}
/* RESPONSIVE */
@media(max-width:900px){.page-wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr}.panel{border-right:none;border-bottom:1px solid var(--border)}.content-area{min-height:50vh}}
@media(max-width:640px){.navbar{padding:0 16px}.panel{padding:18px 16px}.content-area{padding:18px 16px}}
</style>

<style>
.preview-area{display:flex;flex-wrap:wrap;gap:12px;padding:4px 0}
.pdf-preview{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;align-items:center;gap:10px;width:calc(50% - 6px)}
.pdf-icon{font-size:1.8em}
.pdf-info{flex:1;overflow:hidden}
.pdf-name{font-weight:600;font-size:.8em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.pdf-size{font-size:.7em;color:var(--text-muted)}
.pdf-remove{background:none;border:none;cursor:pointer;color:#ff4757;font-size:.9em;flex-shrink:0}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo"><div class="logo-icon">📄</div>Doctor PDF</a>
  <div class="nav-actions">
    <button class="btn-icon" onclick="toggleDark()" id="themeBtn" title="Dark mode">🌙</button>
    <button class="btn-icon" onclick="toggleLang()" id="langBtn" title="Language">🌐</button>
  </div>
</nav>

<div class="page-wrap">
<div class="panel">
  <div>
    <a href="index.html" class="back-link">← All tools</a>
    <div class="tool-header"><span class="tool-emoji">📑</span><h1 id="pageTitle">Merge PDF</h1><p class="tool-desc" id="pageDesc">Combine multiple PDFs into one document</p></div>
  </div>
  <div class="upload-area" id="uploadArea">
    <span class="up-icon">📁</span>
    <p class="up-title" id="uploadTitle">Click or drag PDF files here</p>
    <small class="up-sub" id="uploadSub">Select 2 or more PDF files</small>
    <input type="file" id="fileInput" multiple accept=".pdf">
  </div>
  <div class="file-list-panel" id="fileList"></div>
  <div class="spinner" id="spinner"></div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="progress-text" id="progressText">Processing…</p>
  </div>
  <button class="action-btn" id="actionBtn" onclick="mergeFiles()" disabled style="margin-top:auto"><span id="actionLabel">Merge PDFs</span></button>
  <div class="result-box" id="result">
    <p class="result-title" id="resultTitle">✅ PDFs merged!</p>
    <a class="download-btn" id="downloadBtn" download="merged.pdf">📥 Download Merged PDF</a>
  </div>
</div>
<div class="content-area" id="contentArea">
  <div class="content-placeholder" id="placeholder"><span class="ph-icon">📑</span><p id="phText">Upload at least 2 PDF files.<br>Drag to reorder them before merging.</p></div>
  <div class="preview-area" id="previewArea" style="display:none"></div>
</div>
</div>
<script>
let uploadedFiles=[],processedBlob=null;
const uploadArea=document.getElementById('uploadArea'),fileInput=document.getElementById('fileInput'),actionBtn=document.getElementById('actionBtn');
uploadArea.addEventListener('click',()=>fileInput.click());
uploadArea.addEventListener('dragover',e=>e.preventDefault());
uploadArea.addEventListener('drop',e=>{e.preventDefault();handleFiles(e.dataTransfer.files);});
fileInput.addEventListener('change',e=>handleFiles(e.target.files));
function handleFiles(files){for(let f of files)if(f.type==='application/pdf')uploadedFiles.push(f);render();actionBtn.disabled=uploadedFiles.length<2;}
function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';return (b/1048576).toFixed(1)+' MB';}
function render(){
  const fl=document.getElementById('fileList');fl.innerHTML='';
  const pa=document.getElementById('previewArea');
  if(uploadedFiles.length>0){
    document.getElementById('placeholder').style.display='none';
    pa.style.display='flex';pa.innerHTML='';
    uploadedFiles.forEach((f,i)=>{
      const d=document.createElement('div');d.className='pdf-preview';
      d.innerHTML=`<span class="pdf-icon">📄</span><div class="pdf-info"><div class="pdf-name">${i+1}. ${f.name}</div><div class="pdf-size">${formatSize(f.size)}</div></div><button class="pdf-remove" onclick="removeFile(${i})">✕</button>`;
      pa.appendChild(d);
    });
  } else {document.getElementById('placeholder').style.display='flex';pa.style.display='none';pa.innerHTML='';}
}
function removeFile(i){uploadedFiles.splice(i,1);render();actionBtn.disabled=uploadedFiles.length<2;}
function setProgress(pct,msg){document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=msg;}
async function mergeFiles(){
  document.getElementById('spinner').style.display='block';
  document.getElementById('progressWrap').style.display='block';
  actionBtn.disabled=true;
  try{
    const{PDFDocument}=PDFLib;
    const merged=await PDFDocument.create();
    for(let i=0;i<uploadedFiles.length;i++){
      setProgress((i/uploadedFiles.length)*90,`Merging file ${i+1}/${uploadedFiles.length}…`);
      const bytes=await uploadedFiles[i].arrayBuffer();
      const pdf=await PDFDocument.load(bytes);
      const pages=await merged.copyPages(pdf,pdf.getPageIndices());
      pages.forEach(p=>merged.addPage(p));
    }
    setProgress(100,'Done!');
    const out=await merged.save();
    processedBlob=new Blob([out],{type:'application/pdf'});
    showResult('merged.pdf');
    if(typeof gtag!=='undefined')gtag('event','pdf_merged',{event_category:'PDF Tools',value:uploadedFiles.length});
  }catch(e){alert('Error: '+e.message);document.getElementById('spinner').style.display='none';actionBtn.disabled=false;}
}
function showResult(fn){
  document.getElementById('spinner').style.display='none';
  const btn=document.getElementById('downloadBtn');
  btn.href=URL.createObjectURL(processedBlob);btn.download=fn;
  document.getElementById('result').style.display='block';
  setTimeout(()=>{const a=document.createElement('a');a.href=btn.href;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);},400);
}

let dark=localStorage.getItem('dark')==='true';
if(dark){document.body.classList.add('dark');const tb=document.getElementById('themeBtn');if(tb)tb.textContent='☀️';}
function toggleDark(){dark=!dark;document.body.classList.toggle('dark',dark);const tb=document.getElementById('themeBtn');if(tb)tb.textContent=dark?'☀️':'🌙';localStorage.setItem('dark',dark);}
let lang=localStorage.getItem('lang')||'en';
const _tr={"en": {"pageTitle": "Merge PDF", "pageDesc": "Combine multiple PDFs into one document", "uploadTitle": "Click or drag PDF files here", "uploadSub": "Select 2 or more PDF files", "actionLabel": "Merge PDFs", "resultTitle": "✅ PDFs merged!", "phText": "Upload at least 2 PDF files.<br>Drag to reorder them before merging."}, "ar": {"pageTitle": "دمج PDF", "pageDesc": "ادمج عدة ملفات PDF في مستند واحد", "uploadTitle": "اضغط أو اسحب ملفات PDF هنا", "uploadSub": "اختر 2 أو أكثر من ملفات PDF", "actionLabel": "دمج الملفات", "resultTitle": "✅ تم الدمج!", "phText": "ارفع ملفين أو أكثر.<br>يمكنك إعادة ترتيبهم قبل الدمج."}};
function applyLang(){document.documentElement.lang=lang;document.body.dir=lang==='ar'?'rtl':'ltr';const t=_tr[lang]||{};Object.entries(t).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.innerHTML=val;});}
function toggleLang(){lang=lang==='en'?'ar':'en';localStorage.setItem('lang',lang);applyLang();}
applyLang();

</script></body></html>
