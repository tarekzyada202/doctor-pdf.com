<script>let uploadedFile=null;document.getElementById("uploadArea").addEventListener("click",()=>document.getElementById("fileInput").click());document.getElementById("fileInput").addEventListener("change",e=>{uploadedFile=e.target.files[0];document.getElementById("actionBtn").disabled=!uploadedFile});async function convertToImage(){try{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';const bytes=await uploadedFile.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:bytes}).promise;const page=await pdf.getPage(1);const viewport=page.getViewport({scale:2});const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');canvas.height=viewport.height;canvas.width=viewport.width;await page.render({canvasContext:ctx,viewport:viewport}).promise;canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);document.getElementById("downloadBtn").href=url;document.getElementById("result").style.display="block";setTimeout(()=>{const _a=document.createElement("a");_a.href=url;_a.download="page-1.png";document.body.appendChild(_a);_a.click();document.body.removeChild(_a);},400);;setTimeout(()=>{const _a=document.createElement("a");_a.href=url;_a.download="extracted-text.txt";document.body.appendChild(_a);_a.click();document.body.removeChild(_a);},400);;
  setTimeout(()=>{ const btn=document.getElementById("downloadBtn"); const a=document.createElement("a"); a.href=btn.href; a.download=btn.download||"download"; document.body.appendChild(a); a.click(); document.body.removeChild(a); }, 300);;},'image/png');}catch(e){alert('Error: '+e.message);}}</script>
