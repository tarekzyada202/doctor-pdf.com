<style>

:root{--primary:#6366f1;--secondary:#8b5cf6;--success:#10b981;--danger:#ef4444;--bg:#f8fafc;--surface:#ffffff;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--shadow-hover:0 8px 30px rgba(99,102,241,.2);--radius:14px}
.dark{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#f1f5f9;--text-muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;transition:background .3s,color .3s;overflow:hidden}
/* NAVBAR */
.navbar{background:rgba(248,250,252,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:200;transition:background .3s}
.dark .navbar{background:rgba(15,23,42,.95)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-size:1.05em;font-weight:800;color:var(--primary)}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8em}
.nav-right{display:flex;align-items:center;gap:8px}
.btn-icon{width:32px;height:32px;border:1px solid var(--border);background:var(--surface);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8em;transition:all .2s;color:var(--text)}
.btn-icon:hover{background:var(--primary);color:white;border-color:var(--primary)}
/* LAYOUT */
.workspace{display:flex;flex:1;overflow:hidden}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 28px;display:flex;flex-direction:column;gap:16px;position:relative}
.panel{width:340px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:20px 20px;gap:14px}
/* DROP OVERLAY */
.drop-overlay{position:fixed;inset:0;background:rgba(99,102,241,.12);border:3px dashed var(--primary);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;pointer-events:none}
.drop-overlay.active{display:flex}
.drop-overlay-icon{font-size:4em}
.drop-overlay-text{font-size:1.3em;font-weight:700;color:var(--primary)}
/* PLACEHOLDER */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-muted);text-align:center;gap:12px;padding:40px}
.placeholder .ph-icon{font-size:5em;opacity:.2}
.placeholder p{font-size:.88em;opacity:.5;line-height:1.6;max-width:320px}
/* PANEL ELEMENTS */
.back-link{display:inline-flex;align-items:center;gap:5px;color:var(--primary);text-decoration:none;font-weight:600;font-size:.78em;opacity:.8}
.back-link:hover{opacity:1}
.tool-title{color:var(--primary);font-size:1.15em;font-weight:800;margin-bottom:3px;letter-spacing:-.3px}
.tool-desc{color:var(--text-muted);font-size:.75em;line-height:1.4}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:18px 12px;text-align:center;cursor:pointer;background:var(--bg);transition:all .2s}
.upload-zone:hover{border-color:var(--primary);background:rgba(99,102,241,.04)}
.up-icon{font-size:1.5em;display:block;margin-bottom:5px}
.up-title{color:var(--primary);font-weight:700;font-size:.82em;margin-bottom:2px}
.up-sub{color:var(--text-muted);font-size:.7em}
input[type=file]{display:none}
.opt-label{display:block;font-weight:600;font-size:.72em;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.opt-select,.opt-input,.opt-password{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.82em;background:var(--surface);color:var(--text);margin-bottom:10px;font-family:inherit;transition:border .2s}
.opt-select:focus,.opt-input:focus,.opt-password:focus{outline:none;border-color:var(--primary)}
.opts-section{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px}
.action-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border:none;padding:11px 20px;border-radius:100px;font-size:.88em;font-weight:700;cursor:pointer;width:100%;transition:all .2s;margin-top:auto}
.action-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.35)}
.action-btn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;transform:none;box-shadow:none}
.progress-wrap{display:none}
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));width:0%;transition:width .3s;border-radius:100px}
.progress-text{font-size:.7em;color:var(--text-muted);margin-top:4px;text-align:center}
.result-box{display:none;padding:12px;background:rgba(16,185,129,.08);border-radius:9px;border:1px solid rgba(16,185,129,.2)}
.result-title{color:var(--success);font-weight:700;font-size:.8em;margin-bottom:8px;text-align:center}
.download-btn-full{background:var(--success);color:white;padding:9px 20px;border-radius:100px;font-size:.82em;font-weight:700;text-decoration:none;display:block;text-align:center;transition:all .2s;border:none;cursor:pointer;width:100%}
.download-btn-full:hover{background:#059669}
.spinner{border:3px solid var(--border);border-top:3px solid var(--primary);border-radius:50%;width:26px;height:26px;animation:spin 1s linear infinite;margin:6px auto;display:none}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat-box{background:var(--bg);border-radius:7px;padding:8px;text-align:center;border:1px solid var(--border)}
.stat-label{font-size:.62em;color:var(--text-muted);font-weight:600;text-transform:uppercase}
.stat-value{font-size:.9em;font-weight:800;color:var(--primary);margin-top:2px}
/* FORMAT GRID */
.format-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.format-option{background:var(--bg);padding:10px 6px;border-radius:8px;cursor:pointer;text-align:center;border:2px solid var(--border);transition:all .2s;font-size:.78em;font-weight:600;color:var(--text-muted)}
.format-option:hover{border-color:var(--primary);color:var(--primary)}
.format-option.selected{background:var(--primary);color:white;border-color:var(--primary)}
/* FILE LIST IN PANEL */
.panel-file-item{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.pfi-name{flex:1;font-size:.75em;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pfi-pages{font-size:.68em;color:var(--text-muted)}
.pfi-remove{background:none;border:none;color:#ef4444;cursor:pointer;font-size:.8em;flex-shrink:0}
/* SIGN CANVAS */
#signCanvas{border:2px solid var(--border);border-radius:12px;cursor:crosshair;width:100%;max-height:340px;touch-action:none;background:white}
.sign-controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.sign-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.8em;font-weight:600;transition:all .2s;font-family:inherit}
.sign-btn:hover{border-color:var(--primary);color:var(--primary)}
/* PREVIEW */
.preview-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:200px;padding:16px}
.preview-wrap img,.preview-wrap canvas{max-width:100%;max-height:480px;border-radius:8px}
/* EXTRACTED TEXT */
#extractedTextArea{width:100%;height:100%;min-height:400px;border:1.5px solid var(--border);border-radius:10px;padding:16px;font-size:.85em;line-height:1.6;background:var(--surface);color:var(--text);font-family:monospace;resize:none;transition:border .2s}
#extractedTextArea:focus{outline:none;border-color:var(--primary)}
.copy-btn{background:var(--primary);color:white;border:none;padding:8px 18px;border-radius:8px;font-size:.8em;font-weight:700;cursor:pointer;transition:all .2s}
.copy-btn:hover{background:var(--secondary)}
/* IMAGE LIST */
.img-list-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px}
.img-thumb{width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
.img-name{flex:1;font-size:.78em;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-remove{background:none;border:none;color:#ef4444;cursor:pointer;font-size:.85em}
/* RESPONSIVE */
@media(max-width:800px){.workspace{flex-direction:column-reverse}.panel{width:100%;border-left:none;border-top:1px solid var(--border);max-height:55vh;overflow-y:auto}.content{flex:none;min-height:45vh}}

body.lang-ar{font-family:'Cairo',sans-serif;}
</style>
</head>
<body><nav class="navbar">
  <a href="index.html" class="logo"><div class="logo-icon">📄</div>Doctor PDF</a>
  <div class="nav-right">
    <button class="btn-icon" onclick="toggleDark()" id="themeBtn">🌙</button>
    <button class="btn-icon" onclick="toggleLang()" id="langBtn" style="font-size:.72em;font-weight:700;width:auto;padding:0 10px;">عربي</button>
  </div>
</nav><div class="drop-overlay" id="dropOverlay">
  <div class="drop-overlay-icon">📂</div>
  <div class="drop-overlay-text" id="dropText">Drop PDF file here</div>
</div>
<div class="workspace">
  <div class="content" id="contentArea">
    <div class="placeholder" id="placeholder">
      <span class="ph-icon">📷</span>
      <p id="phText">Upload a PDF file.<br>Converted images will appear here.</p>
    </div>
    <div id="imagesArea" style="display:none;flex-wrap:wrap;gap:16px;align-content:flex-start"></div>
  </div>
  <div class="panel">
  <a href="index.html" class="back-link">← All tools</a>
  <div>
    <div style="font-size:2em;margin-bottom:6px">📷</div>
    <div class="tool-title" id="tool_title">PDF to Image</div>
    <div class="tool-desc" id="tool_desc">Convert PDF pages to PNG or JPG</div>
  </div>
  <div class="upload-zone" id="uploadZone">
    <span class="up-icon">📁</span>
    <p class="up-title" id="upload_title">Click or drag PDF here</p>
    <small class="up-sub" id="upload_sub">Any PDF file</small>
    <input type="file" id="fileInput" accept=".pdf" >
  </div>
    <div class="opts-section">
      <label class="opt-label" id="fmtLabel">Output Format</label>
      <select class="opt-select" id="imgFormat">
        <option value="image/png" id="fmtPng">PNG (lossless)</option>
        <option value="image/jpeg" id="fmtJpg">JPG (smaller size)</option>
      </select>
      <label class="opt-label" id="scaleLabel">Resolution</label>
      <select class="opt-select" id="imgScale">
        <option value="1" id="res72">Standard (72 DPI)</option>
        <option value="2" selected id="res144">High (144 DPI)</option>
        <option value="3" id="res216">Ultra (216 DPI)</option>
      </select>
    </div>
  <div class="spinner" id="spinner"></div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="progress-text" id="progressText">Processing…</p>
  </div>
  <button class="action-btn" id="actionBtn" onclick="convertToImage()" disabled>
    <span id="actionLabel">Convert to Images</span>
  </button>
  <div class="result-box" id="result">
    <p class="result-title" id="resultTitle">✅ PDF converted!</p>
    <a class="download-btn-full" id="downloadBtn" download="pdf-images.zip" href="#">📥 Download Images (ZIP)</a>
  </div>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let uploadedFile=null;
document.getElementById('uploadZone').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',e=>handleFile(e.target.files[0]));
document.getElementById('uploadZone').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('uploadZone').addEventListener('drop',e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);});
function handleGlobalDrop(files){const f=[...files].find(f=>f.type==='application/pdf');if(f)handleFile(f);}
function handleFile(f){
  if(!f||f.type!=='application/pdf')return;
  uploadedFile=f;
  document.getElementById('actionBtn').disabled=false;
  document.getElementById('placeholder').style.display='none';
  document.getElementById('imagesArea').style.display='flex';
}
function setProgress(pct,msg){document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=msg;}
async function convertToImage(){
  document.getElementById('spinner').style.display='block';
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('actionBtn').disabled=true;
  document.getElementById('imagesArea').innerHTML='';
  try{
    const bytes=await uploadedFile.arrayBuffer();
    const pdfDoc=await pdfjsLib.getDocument({data:bytes}).promise;
    const scale=parseFloat(document.getElementById('imgScale').value);
    const format=document.getElementById('imgFormat').value;
    const ext=format==='image/png'?'png':'jpg';
    const urls=[];
    for(let i=1;i<=pdfDoc.numPages;i++){
      setProgress((i/pdfDoc.numPages)*90,`Rendering page ${i}/${pdfDoc.numPages}…`);
      const page=await pdfDoc.getPage(i);
      const vp=page.getViewport({scale});
      const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
      await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
      const url=await new Promise(r=>cv.toBlob(b=>r(URL.createObjectURL(b)),format,0.92));
      urls.push({url,ext,i});
      // Show preview
      const wrap=document.createElement('div');
      wrap.style.cssText='display:flex;flex-direction:column;gap:8px;align-items:center';
      const img=document.createElement('img');
      img.src=url;img.style.cssText='max-width:200px;border-radius:8px;border:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.1)';
      const lbl=document.createElement('p');lbl.style.cssText='font-size:.72em;color:var(--text-muted);font-weight:600';lbl.textContent=`Page ${i}`;
      const dl=document.createElement('a');dl.href=url;dl.download=`page-${i}.${ext}`;dl.style.cssText='font-size:.72em;color:var(--primary);font-weight:700;text-decoration:none';dl.textContent='↓ Download';
      wrap.appendChild(img);wrap.appendChild(lbl);wrap.appendChild(dl);
      document.getElementById('imagesArea').appendChild(wrap);
    }
    setProgress(100,'Done!');
    document.getElementById('result').style.display='block';
    // Download first page directly
    if(urls.length>0){const a=document.createElement('a');a.href=urls[0].url;a.download=`page-1.${urls[0].ext}`;document.body.appendChild(a);a.click();document.body.removeChild(a);}
    if(typeof gtag!=='undefined')gtag('event','pdf_to_image',{event_category:'PDF Tools'});
  }catch(e){alert('Error: '+e.message);}
  document.getElementById('spinner').style.display='none';
  document.getElementById('actionBtn').disabled=false;
  setTimeout(()=>document.getElementById('progressWrap').style.display='none',600);
}

window.addEventListener('dragenter',e=>{if([...e.dataTransfer.types].includes('Files'))document.getElementById('dropOverlay').classList.add('active');});
window.addEventListener('dragleave',e=>{if(!e.relatedTarget||e.relatedTarget===document.documentElement)document.getElementById('dropOverlay').classList.remove('active');});
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('drop',e=>{e.preventDefault();document.getElementById('dropOverlay').classList.remove('active');if(typeof handleGlobalDrop==='function')handleGlobalDrop(e.dataTransfer.files);});

let _dark=localStorage.getItem('dark')==='true';
if(_dark){document.body.classList.add('dark');const tb=document.getElementById('themeBtn');if(tb)tb.textContent='☀️';}
function toggleDark(){_dark=!_dark;document.body.classList.toggle('dark',_dark);const tb=document.getElementById('themeBtn');if(tb)tb.textContent=_dark?'☀️':'🌙';localStorage.setItem('dark',_dark);}
let _lang=localStorage.getItem('lang')||(navigator.language||'').toLowerCase().startsWith('ar')?'ar':'en';
if(!localStorage.getItem('_langSet')){_lang=(navigator.language||'').toLowerCase().startsWith('ar')?'ar':'en';}else{_lang=localStorage.getItem('lang')||'en';}

const _tr={"en":{"tool_title":"PDF to Image","tool_desc":"Convert PDF pages to PNG or JPG","upload_title":"Click or drag PDF here","upload_sub":"Any PDF file","actionLabel":"Convert to Images","resultTitle":"✅ PDF converted!","phText":"Upload a PDF file.<br>Converted images will appear here.","fmtLabel":"Output Format","fmtPng":"PNG (lossless)","fmtJpg":"JPG (smaller size)","scaleLabel":"Resolution","res72":"Standard (72 DPI)","res144":"High (144 DPI)","res216":"Ultra (216 DPI)","dropText":"Drop PDF file here"},"ar":{"tool_title":"PDF إلى صورة","tool_desc":"حوّل صفحات PDF إلى PNG أو JPG","upload_title":"اضغط أو اسحب ملف PDF هنا","upload_sub":"أي ملف PDF","actionLabel":"تحويل إلى صور","resultTitle":"✅ تم التحويل!","phText":"ارفع ملف PDF.<br>الصور المحوّلة ستظهر هنا.","fmtLabel":"صيغة الإخراج","fmtPng":"PNG (بدون فقدان)","fmtJpg":"JPG (حجم أصغر)","scaleLabel":"الدقة","res72":"عادية (72 DPI)","res144":"عالية (144 DPI)","res216":"فائقة (216 DPI)","dropText":"أسقط ملف PDF هنا"}};
function _applyLang(){
  document.documentElement.lang=_lang;
  document.body.dir='ltr';
  document.body.classList.toggle('lang-ar',_lang==='ar');
  document.getElementById('langBtn').textContent=_lang==='ar'?'EN':'عربي';
  const t=_tr[_lang]||{};
  Object.entries(t).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.innerHTML=val;});
  
}
function toggleLang(){_lang=_lang==='en'?'ar':'en';localStorage.setItem('lang',_lang);localStorage.setItem('_langSet','1');_applyLang();}
_applyLang();

</script></body></html>
