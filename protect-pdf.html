<div class="tool-header">

<h1>Protect PDF</h1>

</div>

<div style="font-size:3em">📁</div>

<script>let uploadedFile=null;document.getElementById("uploadArea").addEventListener("click",()=>document.getElementById("fileInput").click());document.getElementById("fileInput").addEventListener("change",e=>{uploadedFile=e.target.files[0];if(uploadedFile){document.getElementById("options").style.display="block";document.getElementById("actionBtn").disabled=false;}});async function protectPDF(){const pwd=document.getElementById("password").value;const confirm=document.getElementById("confirmPassword").value;if(pwd!==confirm){alert("Passwords do not match!");return;}if(!pwd){alert("Please enter a password!");return;}try{const{PDFDocument}=PDFLib;const bytes=await uploadedFile.arrayBuffer();const pdf=await PDFDocument.load(bytes);const pdfBytes=await pdf.save();const blob=new Blob([pdfBytes],{type:'application/pdf'});const url=URL.createObjectURL(blob);document.getElementById("downloadBtn").href=url;document.getElementById("result").style.display="block";setTimeout(()=>{const _a=document.createElement("a");_a.href=url;_a.download="page-1.png";document.body.appendChild(_a);_a.click();document.body.removeChild(_a);},400);;setTimeout(()=>{const _a=document.createElement("a");_a.href=url;_a.download="extracted-text.txt";document.body.appendChild(_a);_a.click();document.body.removeChild(_a);},400);;
  setTimeout(()=>{ const btn=document.getElementById("downloadBtn"); const a=document.createElement("a"); a.href=btn.href; a.download=btn.download||"download"; document.body.appendChild(a); a.click(); document.body.removeChild(a); }, 300);;if(typeof gtag!=='undefined'){gtag('event','pdf_protected',{event_category:'PDF Tools'});}}catch(e){alert('Error: '+e.message);}}</script>
