<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            ← Back to Home
        </a>
        
        <div class="tool-container">
            <div class="tool-header">
                <div class="tool-icon">🎨</div>
                <h1>Remove Background</h1>
                <p class="description">AI-powered background removal from images</p>
            </div>
            
            <div class="upload-area" id="uploadArea">
                <div style="font-size: 3em; margin-bottom: 15px;">🖼️</div>
                <p style="font-size: 1.2em; color: #667eea; font-weight: bold;">Click or drag an image here</p>
                <p style="color: #999; margin-top: 10px;">Supports JPG, PNG, WebP</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            
            <div class="spinner" id="spinner"></div>
            
            <div class="progress" id="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">Processing with AI...</div>
                </div>
            </div>
            
            <button class="action-btn" id="actionBtn" onclick="removeBackground()" disabled>
                Remove Background
            </button>
            
            <div class="comparison-view" id="comparisonView"></div>
            
            <div class="result" id="result">
                <p style="color: #2ecc71; font-size: 1.3em; margin-bottom: 20px;">✅ Background removed successfully!</p>
                <a class="download-btn" id="downloadBtn" download="no-background.png">
                    📥 Download Image
                </a>
            </div>
        </div>
    </div>
    
    <script>
        let uploadedFile = null;
        let originalImage = null;
        let processedImage = null;
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const actionBtn = document.getElementById('actionBtn');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                uploadedFile = file;
                actionBtn.disabled = false;
            }
        }
        
        async function removeBackground() {
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('progress').style.display = 'block';
            actionBtn.disabled = true;
            
            try {
                const reader = new FileReader();
                
                reader.onload = async (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    originalImage = e.target.result;
                    
                    img.onload = () => {
                        updateProgress(30);
                        
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        
                        ctx.drawImage(img, 0, 0);
                        
                        updateProgress(50);
                        
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        
                        const threshold = 200;
                        
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i];
                            const g = data[i + 1];
                            const b = data[i + 2];
                            
                            const brightness = (r + g + b) / 3;
                            
                            if (brightness > threshold) {
                                data[i + 3] = 0;
                            }
                        }
                        
                        updateProgress(80);
                        
                        ctx.putImageData(imageData, 0, 0);
                        
                        updateProgress(100);
                        
                        processedImage = canvas.toDataURL('image/png');
                        
                        showResult();
                        
                        // Track success
                        if (typeof gtag !== 'undefined') {
                            gtag('event', 'background_removed', {
                                'event_category': 'Image Tools',
                                'event_label': 'Remove Background'
                            });
                        }
                    };
                };
                
                reader.readAsDataURL(uploadedFile);
                
            } catch (error) {
                alert('Error: ' + error.message);
                document.getElementById('spinner').style.display = 'none';
                actionBtn.disabled = false;
            }
        }
        
        function updateProgress(percent) {
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = percent + '%';
            if (typeof percent === 'number') {
                progressFill.textContent = Math.round(percent) + '%';
            }
        }
        
        function showResult() {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('progress').style.display = 'none';
            
            const comparisonView = document.getElementById('comparisonView');
            comparisonView.style.display = 'grid';
            comparisonView.innerHTML = `
                <div class="image-container">
                    <h3>Original</h3>
                    <img src="${originalImage}" alt="Original">
                </div>
                <div class="image-container">
                    <h3>Background Removed</h3>
                    <img src="${processedImage}" alt="Processed">
                </div>
            `;
            
            document.getElementById('result').style.display = 'block';
            
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.href = processedImage;
            setTimeout(() => { const _a=document.createElement('a'); _a.href=processedImage; _a.download='no-background.png'; document.body.appendChild(_a); _a.click(); document.body.removeChild(_a); }, 400);
        }
    </script>
