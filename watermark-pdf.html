<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}.container{max-width:900px;margin:0 auto}.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;color:#667eea;padding:10px 20px;border-radius:25px;text-decoration:none;font-weight:bold;margin-bottom:20px}.tool-container{background:white;padding:40px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.15)}.tool-header{text-align:center;margin-bottom:30px}.tool-icon{font-size:4em}h1{color:#667eea;font-size:2.5em}.description{color:#666;font-size:1.1em}.upload-area{border:3px dashed #667eea;border-radius:15px;padding:50px;text-align:center;cursor:pointer;background:#f8f9ff;margin:30px 0}input[type=file],input[type=text],select{display:block;width:100%;padding:10px;margin:10px 0;border:2px solid #ddd;border-radius:8px}.options{margin:20px 0;display:none}.option-group{margin-bottom:15px}.option-group label{display:block;margin-bottom:5px;font-weight:bold}.action-btn{background:#667eea;color:white;border:none;padding:15px 40px;border-radius:30px;font-size:1.1em;font-weight:bold;cursor:pointer;width:100%}.action-btn:disabled{background:#ccc}.result{display:none;text-align:center;margin-top:30px}.download-btn{background:#2ecc71;color:white;padding:15px 40px;border-radius:30px;font-size:1.1em;font-weight:bold;text-decoration:none;display:inline-block}</style>

<body>
<div class="container">
<a href="index.html" class="back-btn">← Back to Home</a>
<div class="tool-container">
<div class="tool-header">
<div class="tool-icon">💧</div>
<h1>Add Watermark</h1>
<p class="description">Add text watermark to PDF pages</p>
</div>
<div class="upload-area" id="uploadArea">
<div style="font-size:3em">📁</div>
<p style="color:#667eea;font-weight:bold">Click or drag PDF file here</p>
<input type="file" id="fileInput" accept=".pdf" style="display:none">
</div>
<div class="options" id="options">
<div class="option-group">
<label>Watermark Text:</label>
<input type="text" id="watermarkText" placeholder="CONFIDENTIAL" value="CONFIDENTIAL">
</div>
<div class="option-group">
<label>Position:</label>
<select id="position">
<option value="center">Center</option>
<option value="topLeft">Top Left</option>
<option value="topRight">Top Right</option>
<option value="bottomLeft">Bottom Left</option>
<option value="bottomRight">Bottom Right</option>
</select>
</div>
</div>
<button class="action-btn" id="actionBtn" onclick="addWatermark()" disabled>Add Watermark</button>
<div class="result" id="result">
<p style="color:#2ecc71;font-size:1.3em;margin-bottom:20px">✅ Watermark added!</p>
<a class="download-btn" id="downloadBtn" download="watermarked.pdf">📥 Download PDF</a>
</div>
</div>
</div>
<script>let uploadedFile=null;document.getElementById("uploadArea").addEventListener("click",()=>document.getElementById("fileInput").click());document.getElementById("fileInput").addEventListener("change",e=>{uploadedFile=e.target.files[0];if(uploadedFile){document.getElementById("options").style.display="block";document.getElementById("actionBtn").disabled=false;}});async function addWatermark(){try{const{PDFDocument,rgb}=PDFLib;const bytes=await uploadedFile.arrayBuffer();const pdf=await PDFDocument.load(bytes);const text=document.getElementById("watermarkText").value;const pos=document.getElementById("position").value;const pages=pdf.getPages();pages.forEach(page=>{const{width,height}=page.getSize();let x,y;switch(pos){case'center':x=width/2-text.length*5;y=height/2;break;case'topLeft':x=50;y=height-50;break;case'topRight':x=width-200;y=height-50;break;case'bottomLeft':x=50;y=50;break;case'bottomRight':x=width-200;y=50;break;}page.drawText(text,{x:x,y:y,size:40,color:rgb(0.5,0.5,0.5),opacity:0.3});});const pdfBytes=await pdf.save();const blob=new Blob([pdfBytes],{type:'application/pdf'});const url=URL.createObjectURL(blob);document.getElementById("downloadBtn").href=url;document.getElementById("result").style.display="block";setTimeout(()=>{const _a=document.createElement("a");_a.href=url;_a.download="page-1.png";document.body.appendChild(_a);_a.click();document.body.removeChild(_a);},400);;setTimeout(()=>{const _a=document.createElement("a");_a.href=url;_a.download="extracted-text.txt";document.body.appendChild(_a);_a.click();document.body.removeChild(_a);},400);;
  setTimeout(()=>{ const btn=document.getElementById("downloadBtn"); const a=document.createElement("a"); a.href=btn.href; a.download=btn.download||"download"; document.body.appendChild(a); a.click(); document.body.removeChild(a); }, 300);;}catch(e){alert('Error: '+e.message);}}</script>
