<style>
:root{--primary:#6366f1;--secondary:#8b5cf6;--success:#10b981;--bg:#f8fafc;--surface:#ffffff;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--radius:16px}
.dark{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#f1f5f9;--text-muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden}
/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;background:rgba(248,250,252,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
.dark .navbar{background:rgba(15,23,42,.92)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-size:1.2em;font-weight:800;color:var(--primary)}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1em;box-shadow:0 3px 10px rgba(99,102,241,.3)}
.nav-actions{display:flex;align-items:center;gap:10px}
.btn-icon{width:36px;height:36px;border:1px solid var(--border);background:var(--surface);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9em;transition:all .2s;color:var(--text)}
.btn-icon:hover{background:var(--primary);color:white;border-color:var(--primary);transform:scale(1.05)}
/* WRAPPER */
.tool-wrapper{max-width:680px;margin:0 auto;padding:32px 20px 80px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--primary);text-decoration:none;font-weight:600;font-size:.88em;margin-bottom:20px;transition:gap .2s;opacity:.85}
.back-link:hover{gap:12px;opacity:1}
/* CARD */
.tool-card{background:var(--surface);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);border:1px solid var(--border)}
.tool-header{text-align:center;margin-bottom:28px}
.tool-emoji{font-size:3em;margin-bottom:12px;display:block}
.tool-card h1{color:var(--primary);font-size:1.9em;font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
.tool-desc{color:var(--text-muted);font-size:.95em;line-height:1.6}
/* UPLOAD */
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:48px 20px;text-align:center;cursor:pointer;background:var(--bg);transition:all .2s;margin:24px 0}
.upload-area:hover{border-color:var(--primary);background:rgba(99,102,241,.04)}
.upload-area .up-icon{font-size:2.5em;margin-bottom:12px;display:block}
.upload-area .up-title{color:var(--primary);font-weight:700;font-size:1em;margin-bottom:4px}
.upload-area .up-sub{color:var(--text-muted);font-size:.82em}
input[type=file]{display:none}
/* OPTIONS */
.options-box{background:var(--bg);border-radius:12px;padding:20px;margin:0 0 16px;border:1px solid var(--border)}
.opt-label{display:block;font-weight:600;font-size:.8em;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.opt-select,.opt-input,.opt-password{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.95em;background:var(--surface);color:var(--text);margin-bottom:14px;transition:border .2s;font-family:inherit}
.opt-select:focus,.opt-input:focus,.opt-password:focus{outline:none;border-color:var(--primary)}
.opt-select:last-child,.opt-input:last-child,.opt-password:last-child{margin-bottom:0}
/* FORMAT GRID */
.format-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0}
.format-option{background:var(--bg);padding:14px 8px;border-radius:10px;cursor:pointer;text-align:center;border:2px solid var(--border);transition:all .2s;font-size:.85em;font-weight:600;color:var(--text-muted)}
.format-option:hover{border-color:var(--primary);color:var(--primary)}
.format-option.selected{background:var(--primary);color:white;border-color:var(--primary)}
.format-icon{font-size:1.5em;display:block;margin-bottom:4px}
/* BUTTON */
.action-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border:none;padding:14px 40px;border-radius:100px;font-size:1em;font-weight:700;cursor:pointer;width:100%;transition:all .2s;margin-top:16px;letter-spacing:.2px}
.action-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.35)}
.action-btn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;transform:none;box-shadow:none}
/* PROGRESS */
.progress-wrap{display:none;margin:16px 0}
.progress-bar{width:100%;height:8px;background:var(--border);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));width:0%;transition:width .3s;border-radius:100px}
.progress-text{font-size:.82em;color:var(--text-muted);margin-top:6px;text-align:center}
/* RESULT */
.result-box{display:none;text-align:center;margin-top:20px;padding:28px;background:rgba(16,185,129,.08);border-radius:var(--radius);border:1px solid rgba(16,185,129,.2)}
.result-box .result-title{color:var(--success);font-weight:700;font-size:1.05em;margin-bottom:16px}
.download-btn{background:var(--success);color:white;padding:13px 36px;border-radius:100px;font-size:.95em;font-weight:700;text-decoration:none;display:inline-block;transition:all .2s}
.download-btn:hover{background:#059669;transform:translateY(-2px);box-shadow:0 6px 18px rgba(16,185,129,.35)}
/* FILE LIST */
.file-list{margin:16px 0}
.file-item{background:var(--bg);padding:12px 16px;border-radius:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)}
.file-name{font-weight:500;color:var(--text);font-size:.88em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%}
.remove-btn{background:none;border:1px solid #ff4757;color:#ff4757;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:.78em;font-weight:600;transition:all .2s;flex-shrink:0}
.remove-btn:hover{background:#ff4757;color:white}
/* SPINNER */
.spinner{border:3px solid var(--border);border-top:3px solid var(--primary);border-radius:50%;width:36px;height:36px;animation:spin 1s linear infinite;margin:16px auto;display:none}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.stat-box{background:var(--bg);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border)}
.stat-label{font-size:.72em;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:1.15em;font-weight:800;color:var(--primary);margin-top:4px}
/* CANVAS / SIGN */
#signCanvas{border:2px solid var(--border);border-radius:12px;cursor:crosshair;width:100%;touch-action:none;background:white}
.sign-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.sign-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85em;font-weight:600;transition:all .2s;font-family:inherit}
.sign-btn:hover{border-color:var(--primary);color:var(--primary)}
/* RESPONSIVE */
@media(max-width:640px){.tool-card{padding:24px 16px}.navbar{padding:0 16px}.format-grid{grid-template-columns:repeat(3,1fr)}.stats-grid{grid-template-columns:repeat(2,1fr)}}
/* RTL support */
[dir=rtl] .back-link{flex-direction:row-reverse}
[dir=rtl] .back-link:hover{gap:12px}
</style>

<body>

<nav class="navbar">
  <a href="index.html" class="logo"><div class="logo-icon">📄</div>Doctor PDF</a>
  <div class="nav-actions">
    <button class="btn-icon" onclick="toggleDark()" id="themeBtn" title="Toggle dark mode">🌙</button>
    <button class="btn-icon" onclick="toggleLang()" id="langBtn" title="Switch language">🌐</button>
  </div>
</nav>


<div class="tool-wrapper">
  <a href="index.html" class="back-link">← Back to all tools</a>
  <div class="tool-card">
    <div class="tool-header">
      <span class="tool-emoji">✂️</span>
      <h1 id="pageTitle">Split PDF</h1>
      <p class="tool-desc" id="pageDesc">Extract specific pages from your PDF</p>
    </div>
    <div class="upload-area" id="uploadArea">
      <span class="up-icon">📁</span>
      <p class="up-title" id="uploadTitle">Click or drag PDF file here</p>
      <small class="up-sub" id="uploadSub">Supports any PDF file</small>
      <input type="file" id="fileInput" accept=".pdf">
    </div>
    <div class="options-box" id="optBox">
      <label class="opt-label" id="startLabel">Start Page</label>
      <input type="number" class="opt-input" id="startPage" min="1" value="1">
      <label class="opt-label" id="endLabel">End Page</label>
      <input type="number" class="opt-input" id="endPage" min="1" value="1">
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-text" id="progressText">Processing…</p>
    </div>
    <button class="action-btn" id="actionBtn" onclick="splitPDF()" disabled><span id="actionLabel">Split PDF</span></button>
    <div class="result-box" id="result">
      <p class="result-title" id="resultTitle">✅ PDF split successfully!</p>
      <a class="download-btn" id="downloadBtn" download="split.pdf">📥 Download Split PDF</a>
    </div>
  </div>
</div>
<script>
let uploadedFile=null,processedBlob=null;
const uploadArea=document.getElementById('uploadArea'),fileInput=document.getElementById('fileInput'),actionBtn=document.getElementById('actionBtn');
uploadArea.addEventListener('click',()=>fileInput.click());
uploadArea.addEventListener('dragover',e=>{e.preventDefault();});
uploadArea.addEventListener('drop',e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
function handleFile(f){if(!f||f.type!=='application/pdf')return;uploadedFile=f;document.getElementById('optBox').style.display='block';actionBtn.disabled=false;}
async function splitPDF(){
  document.getElementById('spinner').style.display='block';
  document.getElementById('progressWrap').style.display='block';
  actionBtn.disabled=true;
  try{
    const{PDFDocument}=PDFLib;
    const bytes=await uploadedFile.arrayBuffer();
    const src=await PDFDocument.load(bytes);
    const totalPages=src.getPageCount();
    const start=Math.max(1,parseInt(document.getElementById('startPage').value))-1;
    const end=Math.min(totalPages,parseInt(document.getElementById('endPage').value))-1;
    setProgress(40,'Extracting pages…');
    const newPdf=await PDFDocument.create();
    const indices=Array.from({length:end-start+1},(_,i)=>start+i);
    const pages=await newPdf.copyPages(src,indices);
    pages.forEach(p=>newPdf.addPage(p));
    setProgress(90,'Saving…');
    const pdfBytes=await newPdf.save();
    processedBlob=new Blob([pdfBytes],{type:'application/pdf'});
    setProgress(100,'Done!');
    showResult('split.pdf');
  }catch(e){alert('Error: '+e.message);document.getElementById('spinner').style.display='none';actionBtn.disabled=false;}
}
function setProgress(pct,msg){document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=msg;}
function showResult(filename){
  document.getElementById('spinner').style.display='none';
  const btn=document.getElementById('downloadBtn');
  btn.href=URL.createObjectURL(processedBlob);btn.download=filename;
  document.getElementById('result').style.display='block';
  setTimeout(()=>{const a=document.createElement('a');a.href=btn.href;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);},400);
}

// ── Dark Mode ──
let dark = localStorage.getItem('dark') === 'true';
if(dark){document.body.classList.add('dark');const tb=document.getElementById('themeBtn');if(tb)tb.textContent='☀️';}
function toggleDark(){dark=!dark;document.body.classList.toggle('dark',dark);const tb=document.getElementById('themeBtn');if(tb)tb.textContent=dark?'☀️':'🌙';localStorage.setItem('dark',dark);}

// ── Language ──
let lang = localStorage.getItem('lang')||'en';
const toolTr = {"en": {"pageTitle": "Split PDF", "pageDesc": "Extract specific pages from your PDF", "uploadTitle": "Click or drag PDF file here", "uploadSub": "Supports any PDF file", "actionLabel": "Split PDF", "resultTitle": "✅ PDF split successfully!", "dlLabel": "📥 Download Split PDF", "startLabel": "Start Page", "endLabel": "End Page"}, "ar": {"pageTitle": "تقسيم PDF", "pageDesc": "استخرج صفحات محددة من ملف PDF", "uploadTitle": "اضغط أو اسحب ملف PDF هنا", "uploadSub": "يدعم أي ملف PDF", "actionLabel": "تقسيم الملف", "resultTitle": "✅ تم التقسيم بنجاح!", "dlLabel": "📥 تحميل الملف المقسّم", "startLabel": "الصفحة الأولى", "endLabel": "الصفحة الأخيرة"}};
function applyLang(){
  document.documentElement.lang=lang;
  document.body.dir=lang==='ar'?'rtl':'ltr';
  const t=toolTr[lang]||{};
  Object.entries(t).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.innerHTML=val;});
}
function toggleLang(){lang=lang==='en'?'ar':'en';localStorage.setItem('lang',lang);applyLang();}
applyLang();
</script>
</body>
