<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}.container{max-width:900px;margin:0 auto}.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;color:#667eea;padding:10px 20px;border-radius:25px;text-decoration:none;font-weight:bold;margin-bottom:20px}.tool-container{background:white;padding:40px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.15)}.tool-header{text-align:center;margin-bottom:30px}.tool-icon{font-size:4em}h1{color:#667eea;font-size:2.5em}.description{color:#666;font-size:1.1em}.upload-area{border:3px dashed #667eea;border-radius:15px;padding:50px;text-align:center;cursor:pointer;background:#f8f9ff;margin:30px 0}input[type=file]{display:none}.format-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin:20px 0}.format-option{background:#f0f0f0;padding:15px;border-radius:10px;cursor:pointer;text-align:center;border:2px solid transparent;transition:all .3s}.format-option:hover{border-color:#667eea}.format-option.selected{background:#667eea;color:white;border-color:#667eea}.action-btn{background:#667eea;color:white;border:none;padding:15px 40px;border-radius:30px;font-size:1.1em;font-weight:bold;cursor:pointer;width:100%}.action-btn:disabled{background:#ccc}.result{display:none;text-align:center;margin-top:30px}.download-btn{background:#2ecc71;color:white;padding:15px 40px;border-radius:30px;font-size:1.1em;font-weight:bold;text-decoration:none;display:inline-block}</style>

<body>
<div class="container">
<a href="index.html" class="back-btn">← Back to Home</a>
<div class="tool-container">
<div class="tool-header">
<div class="tool-icon">🔄</div>
<h1>Convert Image Format</h1>
<p class="description">Convert between PNG, JPG, WebP, BMP, GIF</p>
</div>
<div class="upload-area" id="uploadArea">
<div style="font-size:3em">🖼️</div>
<p style="color:#667eea;font-weight:bold">Click or drag image here</p>
<input type="file" id="fileInput" accept="image/*">
</div>
<div id="formatSelector" style="display:none">
<h3 style="text-align:center;margin:20px 0">Select Output Format:</h3>
<div class="format-grid">
<div class="format-option selected" onclick="selectFormat('png')" data-format="png">
<div style="font-size:2em">🖼️</div>
<div>PNG</div>
</div>
<div class="format-option" onclick="selectFormat('jpg')" data-format="jpg">
<div style="font-size:2em">📸</div>
<div>JPG</div>
</div>
<div class="format-option" onclick="selectFormat('webp')" data-format="webp">
<div style="font-size:2em">🌐</div>
<div>WebP</div>
</div>
<div class="format-option" onclick="selectFormat('bmp')" data-format="bmp">
<div style="font-size:2em">🎨</div>
<div>BMP</div>
</div>
<div class="format-option" onclick="selectFormat('gif')" data-format="gif">
<div style="font-size:2em">🎬</div>
<div>GIF</div>
</div>
</div>
</div>
<button class="action-btn" id="actionBtn" onclick="convertImage()" disabled>Convert Image</button>
<div class="result" id="result">
<p style="color:#2ecc71;font-size:1.3em;margin-bottom:20px">✅ Image converted!</p>
<a class="download-btn" id="downloadBtn" download="converted.png">📥 Download Image</a>
</div>
</div>
</div>
<script>let uploadedFile=null;let selectedFormat='png';const formats={png:{mime:'image/png',ext:'png'},jpg:{mime:'image/jpeg',ext:'jpg'},webp:{mime:'image/webp',ext:'webp'},bmp:{mime:'image/bmp',ext:'bmp'},gif:{mime:'image/gif',ext:'gif'}};document.getElementById("uploadArea").addEventListener("click",()=>document.getElementById("fileInput").click());document.getElementById("fileInput").addEventListener("change",e=>{uploadedFile=e.target.files[0];if(uploadedFile){document.getElementById("formatSelector").style.display="block";document.getElementById("actionBtn").disabled=false;}});function selectFormat(format){selectedFormat=format;document.querySelectorAll('.format-option').forEach(el=>el.classList.remove('selected'));document.querySelector(`[data-format="${format}"]`).classList.add('selected');}async function convertImage(){try{const img=new Image();const reader=new FileReader();reader.onload=e=>{img.src=e.target.result;img.onload=()=>{const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);const format=formats[selectedFormat];canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const btn=document.getElementById("downloadBtn");btn.href=url;btn.download=`converted.${format.ext}`;document.getElementById("result").style.display="block";
  setTimeout(()=>{ const btn=document.getElementById("downloadBtn"); const a=document.createElement("a"); a.href=btn.href; a.download=btn.download||"download"; document.body.appendChild(a); a.click(); document.body.removeChild(a); }, 300);;},format.mime,0.92);};};reader.readAsDataURL(uploadedFile);}catch(e){alert('Error: '+e.message);}}</script>
</body>
